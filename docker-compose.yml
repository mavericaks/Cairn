# ═══════════════════════════════════════════════════════════════════
# Cairn Local Development Environment (E1-T11, ADR-005)
# ═══════════════════════════════════════════════════════════════════
# WHY: This mirrors the Railway production stack locally, providing
# the backing services (PostgreSQL + Redis) needed to run the Spring
# Boot application.
#
# HOW TO USE:
#   1. Start services:  docker compose up -d
#   2. Stop services:   docker compose down
#   3. Destroy data:    docker compose down -v
#
# The Spring Boot app itself is NOT included here. Run it from your
# IDE or via `./mvnw spring-boot:run`. It will connect to these
# services using the default credentials in application.yml.
# ═══════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL + pgvector ─────────────────────────────────────────
  # WHY: Primary datastore and vector database.
  # Using pgvector/pgvector:pg17 to match the CI environment and ensure
  # Flyway migration V1 (which runs CREATE EXTENSION vector) succeeds.
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cairn-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cairn
      POSTGRES_USER: cairn
      POSTGRES_PASSWORD: cairn
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cairn"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  # WHY: Cache layer for domain context (Epic 2, ADR-004).
  # Lightweight alpine image.
  redis:
    image: redis:7-alpine
    container_name: cairn-redis
    ports:
      - "6379:6379"
    # WHY: Require a password to mirror production environments,
    # even though this is just local dev.
    command: redis-server --requirepass password
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode) ────────────────────────────────────────────
  # WHY: Event bus for async Human-in-the-Loop (HITL) approval queue.
  # Using official Apache image in KRaft mode (no ZooKeeper).
  kafka:
    image: apache/kafka:3.7.0
    container_name: cairn-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/tmp/kafka-logs
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volumes ───────────────────────────────────────────────────────
# WHY: Named volumes ensure database and cache data survive when
# containers are stopped or recreated.
volumes:
  postgres-data:
  redis-data:
  kafka-data:
